<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLEUDY MULTISERVICES - Professional Services in San Diego</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
line-height:1.6;
color:#333;
}

:root{
--primary-color:#2E5E8B;
--secondary-color:#4CAF50;
--accent-color:#25D366;
}

header{
background:linear-gradient(135deg,var(--primary-color),var(--secondary-color));
color:white;
padding:1rem 0;
position:sticky;
top:0;
z-index:1000;
}

.header-container{
max-width:1400px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
flex-wrap:wrap;
}

.logo-area{
display:flex;
align-items:center;
gap:15px;
}

.logo{
width:100px;
height:100px;
background:white;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:var(--primary-color);
font-size:14px;
text-align:center;
}

.contact-info{
display:flex;
gap:20px;
}

.contact-item{
display:flex;
align-items:center;
gap:8px;
}

.contact-item a{
color:white;
text-decoration:none;
}

.hero{
height:80vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
background:linear-gradient(rgba(46,94,139,.7),rgba(76,175,80,.7));
}

.hero h1{
font-size:4rem;
margin-bottom:20px;
}

.hero h2{
font-size:2rem;
margin-bottom:20px;
}

.ai-chatbot{
position:fixed;
bottom:20px;
right:20px;
z-index:1000;
}

.chatbot-btn{
width:60px;
height:60px;
background:var(--primary-color);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:30px;
cursor:pointer;
margin-bottom:10px;
}

.chatbot-window{
position:absolute;
bottom:80px;
right:0;
width:350px;
background:white;
border-radius:15px;
display:none;
}

.chatbot-header{
background:var(--primary-color);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.chatbot-messages{
height:250px;
padding:15px;
overflow-y:auto;
background:#f9f9f9;
}

.chatbot-input{
display:flex;
padding:10px;
border-top:1px solid #ddd;
}

.chatbot-input input{
flex:1;
padding:10px;
border:1px solid #ddd;
}

.chatbot-input button{
background:var(--primary-color);
color:white;
border:none;
padding:10px;
margin-left:10px;
}

</style>
</head>

<body>

<header>

<div class="header-container">

<div class="logo-area">

<div class="logo">
FLEUDY<br>MULTISERVICES
</div>

</div>

<div class="contact-info">

<div class="contact-item">
<i class="fas fa-phone"></i>
<a href="tel:+16199208096">+1 (619) 920-8096</a>
</div>

<div class="contact-item">
<i class="fas fa-envelope"></i>
<a href="mailto:info@fleudymultiservices.com">
info@fleudymultiservices.com
</a>
</div>

</div>

</div>

</header>

<section class="hero">

<div>

<h1>FLEUDY MULTISERVICES</h1>

<h2>Your Trusted Partner in San Diego</h2>

<p>
Professional, Fast, and Quality Services for Your Home and Business Needs
</p>

</div>

</section>

<div class="ai-chatbot">

<a href="https://wa.me/16199208096"
target="_blank"
class="chatbot-btn"
style="background:#25D366">

<i class="fab fa-whatsapp"></i>

</a>

<div class="chatbot-btn"
onclick="toggleChatbot()">

<i class="fas fa-robot"></i>

</div>

<div class="chatbot-window"
id="chatbotWindow">

<div class="chatbot-header">

<h3>Fleudy AI Assistant</h3>

<span onclick="toggleChatbot()">×</span>

</div>

<div class="chatbot-messages">

<div>

👋 Hi! I'm Fleudy's AI assistant.
How can I help you today?

</div>

</div>

<div class="chatbot-input">

<input type="text" placeholder="Ask me anything...">

<button>
<i class="fas fa-paper-plane"></i>
</button>

</div>

</div>

</div>

<script>

function toggleChatbot(){

let chat=document.getElementById("chatbotWindow");

if(chat.style.display==="block"){

chat.style.display="none";

}else{

chat.style.display="block";

}

}

</script>

</body>
</html>
