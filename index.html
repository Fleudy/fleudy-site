/* =========================

   ========================= */

function toggleChatbot() {
    const win = document.getElementById("chatbotWindow");
    win.style.display = win.style.display === "block" ? "none" : "block";
}

function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    setTimeout(() => {
        addMessage(getAIResponse(message), "bot");
    }, 800);
}

function addMessage(text, type) {
    const container = document.getElementById("chatbotMessages");
    const msg = document.createElement("div");
    msg.className = "message";

    const bubble = document.createElement("div");
    bubble.className = type === "user" ? "user-message" : "bot-message";
    bubble.textContent = text;

    msg.appendChild(bubble);
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
}

function getAIResponse(message) {
    message = message.toLowerCase();

    if (message.includes("price") || message.includes("estimate"))
        return "Please send photos through WhatsApp for a free estimate.";
    if (message.includes("tax"))
        return "We provide professional tax preparation services.";
    if (message.includes("immigration"))
        return "We help with immigration forms and documents.";
    if (message.includes("cleaning"))
        return "We offer professional home cleaning services.";

    return "Thank you for contacting Fleudy Multiservices. We will assist you shortly.";
}
